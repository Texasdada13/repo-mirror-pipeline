# =============================================================================
# Patriot Tech Systems — Sync Personal Repos to Organization
#
# Schedule: Every Friday at 8:00 PM EST (Saturday 01:00 UTC)
#
# Required GitHub Secrets:
#   PERSONAL_SYNC_TOKEN  - PAT with 'repo' scope for Texasdada13
#   ORG_SYNC_TOKEN       - PAT with 'repo', 'admin:org', and 'workflow' scopes
#                          for the target org (patriottechsys)
#   PERSONAL_USERNAME    - Personal GitHub username (e.g. "Texasdada13")
#   ORG_NAME             - Target org name (e.g. "patriottechsys")
#   EXCLUDE_REPOS        - (Optional) Comma-separated repo names to skip
# =============================================================================

name: Sync Personal Repos to Organization

on:
  schedule:
    # Friday 8PM EST = Saturday 1AM UTC
    - cron: '0 1 * * 6'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout controller repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyGithub

      - name: Validate secrets are set
        run: |
          MISSING=0
          for SECRET_NAME in PERSONAL_TOKEN ORG_TOKEN PERSONAL_USERNAME ORG_NAME; do
            VAL=$(printenv "$SECRET_NAME" 2>/dev/null || true)
            if [ -z "$VAL" ]; then
              echo "::error::Missing required secret: $SECRET_NAME"
              MISSING=1
            else
              echo "✓ $SECRET_NAME is set"
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo "::error::One or more required secrets are missing. See workflow comments for setup instructions."
            exit 1
          fi
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_SYNC_TOKEN }}
          ORG_TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
          PERSONAL_USERNAME: ${{ secrets.PERSONAL_USERNAME }}
          ORG_NAME: ${{ secrets.ORG_NAME }}

      - name: Run sync script
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_SYNC_TOKEN }}
          ORG_TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
          PERSONAL_USERNAME: ${{ secrets.PERSONAL_USERNAME }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
        run: python scripts/sync_repos.py

      - name: Upload sync report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sync-report-${{ github.run_id }}
          path: sync_report.json
          retention-days: 30
