name: Sync Personal Repos to Organization

on:
  schedule:
    # Friday 8PM EST = Saturday 1AM UTC
    - cron: '0 1 * * 6'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout controller repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyGithub requests gitpython

      - name: Run sync script
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          ORG_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          PERSONAL_USERNAME: ${{ secrets.PERSONAL_USERNAME }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
        run: |
          python scripts/sync_repos.py

      - name: Upload sync report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sync-report-${{ github.run_id }}
          path: sync_report.json
          retention-days: 30
          # ─── EMAIL NOTIFICATION BLOCK (Microsoft 365 / Outlook Business) ──────

      - name: Send Email — Sync Completed Successfully
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          secure: false
          tls: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          subject: "✅ [Patriot Tech] Repo Sync Completed Successfully — ${{ github.run_id }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "Patriot Tech CI/CD <${{ secrets.NOTIFY_EMAIL_USER }}>"
          html_body: |
            <h2 style="color:#2e7d32;">✅ Repo Sync Completed Successfully</h2>
            <table style="border-collapse:collapse;width:100%;font-family:Arial,sans-serif;">
              <tr><td style="padding:8px;font-weight:bold;background:#f5f5f5;">Workflow</td><td style="padding:8px;">${{ github.workflow }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#f5f5f5;">Repository</td><td style="padding:8px;">${{ github.repository }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#f5f5f5;">Branch</td><td style="padding:8px;">${{ github.ref_name }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#f5f5f5;">Triggered By</td><td style="padding:8px;">${{ github.actor }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#f5f5f5;">Run ID</td><td style="padding:8px;">${{ github.run_id }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#f5f5f5;">Timestamp (UTC)</td><td style="padding:8px;">${{ github.event.head_commit.timestamp }}</td></tr>
            </table>
            <p style="margin-top:16px;">
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                 style="background:#1565c0;color:#fff;padding:10px 20px;text-decoration:none;border-radius:4px;">
                View Run Logs
              </a>
            </p>
            <p style="color:#888;font-size:12px;margin-top:24px;">
              Patriot Tech Systems Consulting LLC — Automated CI/CD Notification
            </p>

      - name: Send Email — Sync FAILED (Alert)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          secure: false
          tls: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          subject: "🚨 [ALERT] Repo Sync FAILED — ${{ github.workflow }} | Run ${{ github.run_id }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "Patriot Tech CI/CD Alerts <${{ secrets.NOTIFY_EMAIL_USER }}>"
          html_body: |
            <h2 style="color:#c62828;">🚨 Repo Sync Failed — Immediate Attention Required</h2>
            <table style="border-collapse:collapse;width:100%;font-family:Arial,sans-serif;">
              <tr><td style="padding:8px;font-weight:bold;background:#fbe9e7;">Workflow</td><td style="padding:8px;">${{ github.workflow }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#fbe9e7;">Repository</td><td style="padding:8px;">${{ github.repository }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#fbe9e7;">Branch</td><td style="padding:8px;">${{ github.ref_name }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#fbe9e7;">Triggered By</td><td style="padding:8px;">${{ github.actor }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#fbe9e7;">Run ID</td><td style="padding:8px;">${{ github.run_id }}</td></tr>
              <tr><td style="padding:8px;font-weight:bold;background:#fbe9e7;">Timestamp (UTC)</td><td style="padding:8px;">${{ github.event.head_commit.timestamp }}</td></tr>
            </table>
            <p style="color:#c62828;font-weight:bold;margin-top:16px;">
              The automated repo sync encountered an error. Please review the run logs immediately.
            </p>
            <p style="margin-top:8px;">
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                 style="background:#c62828;color:#fff;padding:10px 20px;text-decoration:none;border-radius:4px;">
                🔍 Investigate Failed Run
              </a>
            </p>
            <p style="color:#888;font-size:12px;margin-top:24px;">
              Patriot Tech Systems Consulting LLC — Automated CI/CD Alert System
            </p>
