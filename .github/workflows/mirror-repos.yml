# =============================================================================
# Patriot Tech Systems — Automated New Repo Mirror Pipeline
# Schedule: Every Friday at 8:00 PM EST (Saturday 01:00 UTC)
# Action: Discovers personal repos NOT yet in the org, mirrors only those
# =============================================================================

name: "🔄 Weekly New Repo Mirror"

on:
  # Scheduled run — every Friday at 8PM EST (UTC-5 = 01:00 Saturday UTC)
  schedule:
    - cron: "0 1 * * 6"

  # Manual trigger — run anytime from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (list new repos without mirroring)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_sync:
        description: "Force re-mirror a specific repo even if it exists in org (leave empty to skip)"
        required: false
        default: ""
        type: string

env:
  # ================================================================
  # CONFIGURE THESE TWO VALUES
  # ================================================================
  PERSONAL_GITHUB_USERNAME: "Texasdada13"   # ← Replace this
  ORG_SLUG: "https://github.com/patriottechsys"                            # ← Replace this
  # ================================================================

jobs:
  mirror-new-repos:
    name: "Mirror New Repositories"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout pipeline repo"
        uses: actions/checkout@v4

      - name: "🔑 Configure Git credentials"
        run: |
          git config --global user.name "Patriot Tech Mirror Bot"
          git config --global user.email "mirror-bot@patriottechsystems.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com" > ~/.git-credentials

      - name: "📋 Discover personal repositories"
        id: discover
        env:
          GH_TOKEN: ${{ secrets.MIRROR_PAT }}
        run: |
          echo "============================================"
          echo "Discovering repos for: $PERSONAL_GITHUB_USERNAME"
          echo "============================================"

          # ----------------------------------------
          # Step A: Fetch ALL personal repos
          # ----------------------------------------
          ALL_REPOS=""
          PAGE=1
          while true; do
            RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/users/$PERSONAL_GITHUB_USERNAME/repos?per_page=100&page=$PAGE&type=owner")

            NAMES=$(echo "$RESPONSE" | jq -r '.[].name // empty')

            if [ -z "$NAMES" ]; then
              break
            fi

            ALL_REPOS="$ALL_REPOS $NAMES"
            PAGE=$((PAGE + 1))
          done

          TOTAL_PERSONAL=$(echo "$ALL_REPOS" | wc -w | tr -d ' ')
          echo "📦 Total personal repos found: $TOTAL_PERSONAL"

          # ----------------------------------------
          # Step B: Fetch ALL org repos
          # ----------------------------------------
          ORG_REPOS=""
          PAGE=1
          while true; do
            RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/orgs/$ORG_SLUG/repos?per_page=100&page=$PAGE")

            NAMES=$(echo "$RESPONSE" | jq -r '.[].name // empty')

            if [ -z "$NAMES" ]; then
              break
            fi

            ORG_REPOS="$ORG_REPOS $NAMES"
            PAGE=$((PAGE + 1))
          done

          TOTAL_ORG=$(echo "$ORG_REPOS" | wc -w | tr -d ' ')
          echo "🏢 Total org repos found: $TOTAL_ORG"

          # ----------------------------------------
          # Step C: Load exclusion list
          # ----------------------------------------
          EXCLUDED=""
          if [ -f config/mirror-config.json ]; then
            EXCLUDED=$(jq -r '.exclude[]? // empty' config/mirror-config.json)
          fi

          # ----------------------------------------
          # Step D: Find NEW repos (in personal but NOT in org)
          # ----------------------------------------
          NEW_REPOS=""
          SKIPPED_EXISTING=""
          SKIPPED_EXCLUDED=""

          for repo in $ALL_REPOS; do
            # Skip the mirror pipeline repo itself
            if [ "$repo" = "repo-mirror-pipeline" ]; then
              continue
            fi

            # Skip excluded repos
            IS_EXCLUDED=false
            for excl in $EXCLUDED; do
              if [ "$repo" = "$excl" ]; then
                IS_EXCLUDED=true
                break
              fi
            done

            if [ "$IS_EXCLUDED" = true ]; then
              SKIPPED_EXCLUDED="$SKIPPED_EXCLUDED $repo"
              continue
            fi

            # Check if repo already exists in org
            EXISTS_IN_ORG=false
            for org_repo in $ORG_REPOS; do
              if [ "$repo" = "$org_repo" ]; then
                EXISTS_IN_ORG=true
                break
              fi
            done

            if [ "$EXISTS_IN_ORG" = true ]; then
              SKIPPED_EXISTING="$SKIPPED_EXISTING $repo"
            else
              NEW_REPOS="$NEW_REPOS $repo"
            fi
          done

          # ----------------------------------------
          # Step E: Handle force_sync override
          # ----------------------------------------
          FORCE_REPO="${{ github.event.inputs.force_sync }}"
          if [ -n "$FORCE_REPO" ]; then
            echo ""
            echo "🔄 Force sync requested for: $FORCE_REPO"
            # Add force repo to the list (even if it exists in org)
            # Remove it from NEW_REPOS if already there to avoid duplication
            CLEANED=""
            for repo in $NEW_REPOS; do
              if [ "$repo" != "$FORCE_REPO" ]; then
                CLEANED="$CLEANED $repo"
              fi
            done
            NEW_REPOS="$FORCE_REPO $CLEANED"
          fi

          # ----------------------------------------
          # Step F: Report
          # ----------------------------------------
          NEW_COUNT=$(echo "$NEW_REPOS" | wc -w | tr -d ' ')
          SKIP_EXIST_COUNT=$(echo "$SKIPPED_EXISTING" | wc -w | tr -d ' ')
          SKIP_EXCL_COUNT=$(echo "$SKIPPED_EXCLUDED" | wc -w | tr -d ' ')

          echo ""
          echo "============================================"
          echo "📊 DISCOVERY REPORT"
          echo "============================================"
          echo "🆕 New repos to mirror:     $NEW_COUNT"
          echo "⏭️  Skipped (already in org): $SKIP_EXIST_COUNT"
          echo "🚫 Skipped (excluded):       $SKIP_EXCL_COUNT"
          echo ""

          if [ "$NEW_COUNT" -gt 0 ]; then
            echo "New repos to mirror:"
            for repo in $NEW_REPOS; do
              echo "  → $repo"
            done
          else
            echo "✅ No new repos to mirror — org is up to date."
          fi
          echo "============================================"

          # Save to environment
          echo "NEW_REPOS=$NEW_REPOS" >> $GITHUB_ENV
          echo "NEW_COUNT=$NEW_COUNT" >> $GITHUB_ENV
          echo "SKIP_EXIST_COUNT=$SKIP_EXIST_COUNT" >> $GITHUB_ENV
          echo "SKIP_EXCL_COUNT=$SKIP_EXCL_COUNT" >> $GITHUB_ENV
          echo "TOTAL_PERSONAL=$TOTAL_PERSONAL" >> $GITHUB_ENV

      - name: "🔄 Mirror new repositories"
        if: env.NEW_COUNT != '0'
        env:
          GH_TOKEN: ${{ secrets.MIRROR_PAT }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          SUCCESS_COUNT=0
          FAIL_COUNT=0
          SUMMARY=""

          for repo in $NEW_REPOS; do
            echo ""
            echo "============================================"
            echo "Processing: $repo"
            echo "============================================"

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY RUN] Would mirror: $PERSONAL_GITHUB_USERNAME/$repo → $ORG_SLUG/$repo"
              SUMMARY="$SUMMARY\n✅ [DRY RUN] $repo"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              continue
            fi

            # Get personal repo details
            REPO_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$PERSONAL_GITHUB_USERNAME/$repo")
            DESCRIPTION=$(echo "$REPO_INFO" | jq -r '.description // "Mirrored from personal account"')
            IS_PRIVATE=$(echo "$REPO_INFO" | jq -r '.private')

            # Check if org repo exists (for force_sync cases)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$ORG_SLUG/$repo")

            # Create repo in org if it doesn't exist
            if [ "$HTTP_CODE" = "404" ]; then
              echo "  📦 Creating new repo in org: $ORG_SLUG/$repo"

              CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -X POST "https://api.github.com/orgs/$ORG_SLUG/repos" \
                -d "{
                  \"name\": \"$repo\",
                  \"description\": \"$DESCRIPTION\",
                  \"private\": $IS_PRIVATE,
                  \"has_issues\": false,
                  \"has_wiki\": false
                }")

              CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
              if [ "$CREATE_CODE" != "201" ]; then
                echo "  ❌ Failed to create repo (HTTP $CREATE_CODE)"
                FAIL_COUNT=$((FAIL_COUNT + 1))
                SUMMARY="$SUMMARY\n❌ $repo — failed to create in org"
                continue
              fi
              echo "  ✅ Repo created in org"
            else
              echo "  🔄 Repo exists in org (force sync mode)"
            fi

            # Clone bare from personal
            echo "  ⬇️  Cloning from personal..."
            if ! git clone --bare "https://x-access-token:${GH_TOKEN}@github.com/$PERSONAL_GITHUB_USERNAME/$repo.git" "/tmp/$repo.git" 2>/dev/null; then
              echo "  ❌ Failed to clone from personal"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              SUMMARY="$SUMMARY\n❌ $repo — failed to clone"
              rm -rf "/tmp/$repo.git"
              continue
            fi

            # Push mirror to org
            echo "  ⬆️  Pushing mirror to org..."
            cd "/tmp/$repo.git"
            if git push --mirror "https://x-access-token:${GH_TOKEN}@github.com/$ORG_SLUG/$repo.git" 2>/dev/null; then
              echo "  ✅ Successfully mirrored"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              SUMMARY="$SUMMARY\n✅ $repo"
            else
              echo "  ❌ Failed to push mirror"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              SUMMARY="$SUMMARY\n❌ $repo — failed to push"
            fi

            cd /
            rm -rf "/tmp/$repo.git"
          done

          # Summary
          echo ""
          echo "============================================"
          echo "📊 MIRROR SUMMARY"
          echo "============================================"
          echo "🆕 New repos processed: $NEW_COUNT"
          echo "✅ Successful: $SUCCESS_COUNT"
          echo "❌ Failed: $FAIL_COUNT"
          echo ""
          echo -e "Detail:$SUMMARY"
          echo "============================================"

          # Save for summary step
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_ENV
          echo "FAIL_COUNT=$FAIL_COUNT" >> $GITHUB_ENV

          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::warning::$FAIL_COUNT repo(s) failed to mirror"
          fi

      - name: "📝 Create run summary"
        if: always()
        run: |
          echo "## 🔄 Weekly New Repo Mirror — Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Total personal repos | ${TOTAL_PERSONAL:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ Skipped (already in org) | ${SKIP_EXIST_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚫 Skipped (excluded) | ${SKIP_EXCL_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🆕 New repos to mirror | ${NEW_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Successfully mirrored | ${SUCCESS_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | ${FAIL_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${NEW_COUNT:-0}" = "0" ]; then
            echo "**No new repos detected — org is up to date.** ✅" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Run triggered: ${{ github.event_name }} at $(date -u '+%Y-%m-%d %H:%M UTC')*" >> $GITHUB_STEP_SUMMARY